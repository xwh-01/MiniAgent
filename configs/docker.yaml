workspace: .
out: runs/docker

agent:
  max_steps: 50
  command_timeout: 2m
  max_observation_chars: 20000

model:
  provider: openai-compatible
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  temperature: 0
  max_tokens: 4096

environment:
  type: docker
  image: python:3.12
  container_workspace: /workspace
  keep_container: false

# Default-style config for go-code-agent.
# CLI flags override values here.
workspace: .
out: runs/latest

agent:
  max_steps: 50
  command_timeout: 120s
  max_observation_chars: 20000

model:
  provider: openai-compatible
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  temperature: 0
  max_tokens: 4096

environment:
  type: local
